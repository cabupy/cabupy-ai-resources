name: Docs Quality

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/docs-quality.yml"
      - ".lycheeignore"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".github/workflows/docs-quality.yml"
      - ".lycheeignore"

permissions:
  contents: read

jobs:
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            **/*.md

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --exclude-path .github/ISSUE_TEMPLATE
            --exclude-path templates
            --exclude-path skills/*/examples
            --exclude-path agents/*/examples
            .
          fail: true
          failIfEmpty: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
