name: Catalog Consistency

on:
  pull_request:
    paths:
      - "agents/**"
      - "skills/**"
      - "docs/tooling-matrix.md"
      - "scripts/validate_catalog_consistency.py"
      - ".github/workflows/catalog-consistency.yml"
  push:
    branches:
      - main
    paths:
      - "agents/**"
      - "skills/**"
      - "docs/tooling-matrix.md"
      - "scripts/validate_catalog_consistency.py"
      - ".github/workflows/catalog-consistency.yml"

permissions:
  contents: read

jobs:
  validate-catalog-consistency:
    name: Validate Catalog Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run consistency validator
        run: python3 scripts/validate_catalog_consistency.py
